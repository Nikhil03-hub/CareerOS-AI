<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerOS AI - Graduate Roadmap Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{font-family:'Inter',sans-serif;box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0F172A;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:9px;}

/* Sidebar */
.sidebar{width:252px;min-width:252px;background:#0F172A;height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;overflow-y:auto;z-index:50;}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-nav{padding:10px 10px;flex:1;}
.sb-path{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;margin-bottom:3px;}
.sb-path:hover{background:rgba(255,255,255,.07);}
.sb-path.active{background:rgba(99,102,241,.2);}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.25);padding:14px 12px 6px;text-transform:uppercase;}
.sb-icon{width:17px;height:17px;flex-shrink:0;}

/* Main */
.main-content{margin-left:252px;min-height:100vh;background:#F8FAFC;}
.content-inner{padding:30px 32px;max-width:1100px;}

/* Cards */
.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);border:1px solid #F1F5F9;}

/* Progress bar */
.prog-bar{height:8px;border-radius:4px;background:#E2E8F0;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width 1s ease;}

/* Skill node */
.skill-node{border:1.5px solid #E2E8F0;border-radius:12px;padding:14px 16px;background:#fff;cursor:pointer;transition:all .18s;position:relative;}
.skill-node:hover{border-color:#6366F1;box-shadow:0 4px 16px rgba(99,102,241,.1);transform:translateY(-1px);}
.skill-node.done{border-color:#10B981;background:#F0FDF4;}
.skill-node.learning{border-color:#F59E0B;background:#FFFBEB;}
.skill-node.required-badge::before{content:"Required";position:absolute;top:-9px;left:12px;font-size:9px;font-weight:700;background:#6366F1;color:#fff;padding:2px 7px;border-radius:999px;letter-spacing:.04em;}
.skill-node.optional-badge::before{content:"Optional";position:absolute;top:-9px;left:12px;font-size:9px;font-weight:700;background:#94A3B8;color:#fff;padding:2px 7px;border-radius:999px;letter-spacing:.04em;}

/* Phase header */
.phase-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;margin-bottom:16px;cursor:pointer;user-select:none;}

/* Path selection cards */
.path-card{border:2px solid #E2E8F0;border-radius:16px;padding:22px;cursor:pointer;transition:all .2s;background:#fff;}
.path-card:hover{border-color:#6366F1;box-shadow:0 8px 24px rgba(99,102,241,.12);transform:translateY(-3px);}
.path-card.sel{border-color:#6366F1;background:#EEF2FF;}

/* Detail panel */
.detail-panel{position:fixed;right:0;top:0;width:380px;height:100vh;background:#fff;box-shadow:-4px 0 30px rgba(0,0,0,.1);z-index:100;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.detail-panel.open{transform:translateX(0);}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-up{animation:fadeUp .3s ease both;}
.slide-in{animation:slideIn .25s ease both;}

/* Toggle status button */
.status-btn{border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}

/* Top nav */
.top-nav{background:#fff;border-bottom:1px solid #E2E8F0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}

/* Connector line between phases */
.phase-connector{width:2px;height:28px;background:linear-gradient(to bottom,#6366F1,#E2E8F0);margin:0 auto 0 29px;}

/* Skill grid */
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}

/* Resource link */
.res-link{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#F8FAFC;border:1px solid #E2E8F0;text-decoration:none;transition:all .15s;}
.res-link:hover{border-color:#6366F1;background:#EEF2FF;}

/* Inp */
.inp{border:1.5px solid #E2E8F0;border-radius:10px;padding:9px 13px;font-size:13.5px;outline:none;transition:border .18s;background:#fff;width:100%;}
.inp:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.08);}
.btn-primary{background:#6366F1;color:#fff;border-radius:10px;padding:10px 22px;font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:all .18s;}
.btn-primary:hover{background:#4F46E5;box-shadow:0 4px 14px rgba(99,102,241,.35);}

/* ── Companies / Interview Prep ── */
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:11px;margin-top:14px;}
.company-card{border:1.5px solid #E2E8F0;border-radius:14px;padding:16px 10px 12px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;position:relative;}
.company-card:hover{border-color:#6366F1;box-shadow:0 4px 16px rgba(99,102,241,.13);transform:translateY(-2px);}
.company-card.sel{border-color:#6366F1;background:#EEF2FF;box-shadow:0 4px 20px rgba(99,102,241,.15);}
.co-logo{width:42px;height:42px;border-radius:10px;object-fit:contain;display:block;margin:0 auto 8px;}
.co-fallback{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;margin:0 auto 8px;}
.prob-row{display:grid;grid-template-columns:22px 74px 1fr 56px;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #F1F5F9;transition:background .12s;}
.prob-row:hover{background:#F8FAFC;}
.diff-E{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:#DCFCE7;color:#16A34A;text-align:center;white-space:nowrap;}
.diff-M{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:#FEF3C7;color:#D97706;text-align:center;white-space:nowrap;}
.diff-H{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:#FEE2E2;color:#DC2626;text-align:center;white-space:nowrap;}
.topic-chip{font-size:10px;padding:2px 7px;border-radius:999px;background:#F1F5F9;color:#64748B;white-space:nowrap;display:inline-block;}
.prob-solved-cb{width:15px;height:15px;cursor:pointer;accent-color:#10B981;}
.ftab{padding:5px 12px;border-radius:8px;font-size:11.5px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.ftab.active{background:#6366F1;color:#fff;}
.ftab:not(.active){background:#F1F5F9;color:#64748B;}
.ftab:not(.active):hover{background:#E2E8F0;}
.sb-companies-btn{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;margin-bottom:3px;width:100%;border:none;text-align:left;}
.sb-companies-btn:hover{background:rgba(255,255,255,.07);}
.sb-companies-btn.active{background:rgba(99,102,241,.2);}

/* CareerOS premium theme override */
:root{
  --career-bg:#f6fbff;
  --career-ink:#0f172a;
  --career-muted:#64748b;
  --career-line:rgba(15,23,42,.09);
  --career-panel:rgba(255,255,255,.82);
  --career-shadow:0 24px 70px rgba(15,23,42,.10);
  --career-blue:#2563eb;
  --career-cyan:#06b6d4;
}
html,body{background:var(--career-bg)!important;color:var(--career-ink);}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-2;
  background:
    radial-gradient(circle at 8% 8%,rgba(96,165,250,.24),transparent 32%),
    radial-gradient(circle at 86% 3%,rgba(6,182,212,.16),transparent 30%),
    linear-gradient(180deg,#fbfdff 0%,#eef7ff 45%,#fff 100%);
}
body:after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  opacity:.42;
  background-image:
    linear-gradient(rgba(15,23,42,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(15,23,42,.045) 1px,transparent 1px);
  background-size:54px 54px;
  -webkit-mask-image:linear-gradient(180deg,#000,transparent 76%);
  mask-image:linear-gradient(180deg,#000,transparent 76%);
}
.sidebar{
  left:18px;
  top:18px;
  bottom:18px;
  height:calc(100vh - 36px);
  border:1px solid var(--career-line);
  border-radius:28px;
  background:rgba(255,255,255,.72)!important;
  backdrop-filter:blur(34px);
  -webkit-backdrop-filter:blur(34px);
  box-shadow:var(--career-shadow);
}
.sb-logo{border-bottom:1px solid var(--career-line);padding:22px 20px 18px;}
.sb-logo>div:first-child{color:var(--career-ink)!important;font-size:18px!important;}
.sb-logo>div:last-child{color:var(--career-muted)!important;}
.sb-section{color:#94a3b8!important;}
.sb-path,.sb-companies-btn{background:transparent!important;}
.sb-path:hover,.sb-companies-btn:hover{background:rgba(15,23,42,.055)!important;}
.sb-path:not(.active) .sb-icon{color:#64748b!important;}
.sb-path:not(.active)>span:not(.sb-icon){color:#475569!important;}
.sb-path:not(.active)>div>div:first-child,
.sb-companies-btn:not(.active)>div>div:first-child{color:#475569!important;}
.sb-path:not(.active)>div>div:last-child,
.sb-companies-btn:not(.active)>div>div:last-child{color:#94a3b8!important;}
.sb-path.active,.sb-companies-btn.active{
  background:#0f172a!important;
  box-shadow:0 14px 30px rgba(15,23,42,.16);
}
.main-content{
  margin-left:288px;
  background:transparent!important;
}
.top-nav{
  margin:18px 24px 0 0;
  border:1px solid var(--career-line);
  border-radius:22px;
  background:rgba(255,255,255,.76)!important;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  box-shadow:0 18px 50px rgba(15,23,42,.07);
}
.content-inner{max-width:1240px;padding:28px 28px 56px;}
.card{
  border:1px solid var(--career-line)!important;
  border-radius:24px!important;
  background:var(--career-panel)!important;
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  box-shadow:var(--career-shadow)!important;
}
.path-card,.skill-node,.company-card{
  border-color:rgba(15,23,42,.09)!important;
  border-radius:20px!important;
  background:rgba(255,255,255,.82)!important;
  box-shadow:0 14px 34px rgba(15,23,42,.055);
}
.path-card:hover,.skill-node:hover,.company-card:hover{
  border-color:rgba(37,99,235,.35)!important;
  box-shadow:0 22px 48px rgba(37,99,235,.12)!important;
}
.path-card.sel,.company-card.sel{
  border-color:rgba(37,99,235,.45)!important;
  background:linear-gradient(180deg,rgba(239,246,255,.96),rgba(255,255,255,.9))!important;
}
.btn-primary{
  background:linear-gradient(135deg,#0f172a,#2563eb)!important;
  box-shadow:0 18px 40px rgba(37,99,235,.22);
}
.inp{
  background:rgba(255,255,255,.94)!important;
  border-color:rgba(15,23,42,.1)!important;
  border-radius:15px!important;
}
.detail-panel{
  border-left:1px solid var(--career-line);
  background:rgba(255,255,255,.88)!important;
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
}
.co-logo,.co-fallback{border-radius:14px!important;box-shadow:0 10px 24px rgba(15,23,42,.10);}
.prob-row{background:rgba(255,255,255,.82)!important;}
.prob-row:hover{background:#f8fbff!important;}
@media(max-width:900px){
  .sidebar{position:relative;left:auto;top:auto;bottom:auto;width:auto;height:auto;min-width:0;margin:12px;}
  .main-content{margin-left:0;}
  .content-inner{padding:16px;}
  .skills-grid{grid-template-columns:1fr;}
}
</style>
</head>

function loadProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch{return {};}
}
function saveProgress(p){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}
}

function calcPathProgress(roadmap,progress){
  const all=roadmap.phases.flatMap(ph=>ph.skills);
  const done=all.filter(s=>progress[s.id]==="done").length;
  const learning=all.filter(s=>progress[s.id]==="learning").length;
  return{total:all.length,done,learning,pct:all.length?Math.round((done/all.length)*100):0};
}

/* ─────────────────────────────────────────────
   SKILL DETAIL PANEL
───────────────────────────────────────────── */
function SkillPanel({skill,status,onStatusChange,onClose,pathColor}){
  if(!skill) return null;
  const statusOpts=["not-started","learning","done"];
  const cfg={"not-started":{label:"Not Started",col:"#94A3B8",bg:"#F1F5F9"},"learning":{label:"In Progress",col:"#F59E0B",bg:"#FFFBEB"},"done":{label:"Completed",col:"#10B981",bg:"#ECFDF5"}};
  const cur=status||"not-started";
  return(
    <div style={{padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div style={{flex:1,paddingRight:12}}>
          <div style={{fontSize:10,fontWeight:700,color:pathColor,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>
            {skill.type==="required"?"Required":"Optional"} · {skill.time}
          </div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#0F172A",letterSpacing:"-.02em",lineHeight:1.3}}>{skill.name}</h2>
        </div>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid #E2E8F0",background:"#F8FAFC",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#64748B",flexShrink:0}}>
          <div style={{width:14,height:14}}>{Ic.x}</div>
        </button>
      </div>

      <p style={{fontSize:14,color:"#374151",lineHeight:1.75,marginBottom:22}}>{skill.desc}</p>

      {/* Status toggle */}
      <div style={{marginBottom:22}}>
        <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10}}>Your Status</div>
        <div style={{display:"flex",gap:8}}>
          {statusOpts.map(s=>{
            const c=cfg[s];
            const active=cur===s;
            return(
              <button key={s} onClick={()=>onStatusChange(skill.id,s)}
                style={{flex:1,padding:"9px 8px",borderRadius:9,border:`1.5px solid ${active?c.col:"#E2E8F0"}`,background:active?c.bg:"#fff",color:active?c.col:"#64748B",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .18s"}}>
                {c.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Resources */}
      <div>
        <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10}}>Learning Resources</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(skill.resources||[]).map((r,i)=>(
            <a key={i} href={r.u} target="_blank" rel="noopener noreferrer" className="res-link">
              <div style={{width:14,height:14,color:"#6366F1",flexShrink:0}}>{Ic.ext}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"#0F172A",lineHeight:1.3}}>{r.t}</div>
              </div>
              <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:999,background:r.free?"#ECFDF5":"#FEF2F2",color:r.free?"#065F46":"#991B1B"}}>{r.free?"FREE":"PAID"}</span>
            </a>
          ))}
        </div>
      </div>

      {/* roadmap.sh link */}
      <div style={{marginTop:24,paddingTop:20,borderTop:"1px solid #F1F5F9",textAlign:"center"}}>
        <div style={{fontSize:12,color:"#94A3B8",marginBottom:4}}>Full interactive roadmap on</div>
        <a href="https://roadmap.sh/roadmaps" target="_blank" rel="noopener noreferrer" style={{fontSize:13,fontWeight:700,color:"#6366F1",textDecoration:"none"}}>roadmap.sh →</a>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   SKILL NODE CARD
───────────────────────────────────────────── */
function SkillCard({skill,status,onSelect,phaseColor}){
  const cfg={"not-started":{dot:"#E2E8F0",label:""},"learning":{dot:"#F59E0B",label:"In Progress"},"done":{dot:"#10B981",label:"Done"}};

  return(
    <div className={`skill-node ${cur} ${skill.type}-badge`}

      style={{borderLeftWidth:3,borderLeftColor:cur==="done"?"#10B981":cur==="learning"?"#F59E0B":phaseColor}}>

        <div style={{fontWeight:700,fontSize:13.5,color:"#0F172A",lineHeight:1.35}}>{skill.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
          {cur==="done"&&<div style={{width:16,height:16,background:"#10B981",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:10,height:10,color:"#fff"}}>{Ic.check}</div></div>}

          <span>{skill.resources?.length||0} resources</span>

        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   PHASE SECTION
───────────────────────────────────────────── */
function PhaseSection({phase,progress,onSkillSelect,isLast}){
  const [open,setOpen]=useState(true);
  const total=phase.skills.length;
  const done=phase.skills.filter(s=>progress[s.id]==="done").length;
  const pct=Math.round((done/total)*100);
  return(
    <div>
      {/* Phase header */}
      <div className="phase-header" onClick={()=>setOpen(o=>!o)}
        style={{background:`${phase.color}14`,border:`1.5px solid ${phase.color}33`}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:phase.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,flexShrink:0}}>{phase.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:15,color:"#0F172A",letterSpacing:"-.01em"}}>{phase.title}</div>
          <div style={{fontSize:12,color:"#64748B",marginTop:1}}>{phase.months} · {total} skills · {done}/{total} done</div>
        </div>
        <div style={{minWidth:80}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:700,color:phase.color}}>{pct}%</span>
          </div>
          <div className="prog-bar" style={{width:80}}>
            <div className="prog-fill" style={{width:`${pct}%`,background:phase.color}}/>
          </div>
        </div>
        <div style={{width:20,height:20,color:"#94A3B8",transition:"transform .2s",transform:open?"rotate(180deg)":"none"}}>{Ic.chevD}</div>
      </div>

      {open&&(
        <div className="skills-grid fade-up" style={{marginBottom:8}}>
          {phase.skills.map(sk=>(
            <SkillCard key={sk.id} skill={sk} status={progress[sk.id]} onSelect={onSkillSelect} phaseColor={phase.color}/>
          ))}
        </div>
      )}

      {/* Connector */}
      {!isLast&&<div className="phase-connector" style={{marginBottom:12}}/>}
    </div>
  );
}

        </div>

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
          {[{label:"Total Skills",val:total,col:"#6366F1"},{label:"Completed",val:done,col:"#10B981"},{label:"In Progress",val:learning,col:"#F59E0B"},{label:"Avg Salary",val:roadmap.salary,col:"#8B5CF6"}].map(s=>(
            <div key={s.label} style={{background:"#fff",borderRadius:12,padding:"14px 16px",border:"1px solid #F1F5F9",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>{s.label}</div>
              <div style={{fontSize:22,fontWeight:800,color:s.col}}>{s.val}</div>
            </div>
          ))}
        </div>

        {/* Overall progress */}
        <div style={{background:"#fff",borderRadius:12,padding:"16px 20px",border:"1px solid #F1F5F9",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700,color:"#0F172A"}}>Overall Progress</div>
            <div style={{fontSize:20,fontWeight:800,color:roadmap.color}}>{pct}%</div>
          </div>
          <div className="prog-bar">
            <div className="prog-fill" style={{width:`${pct}%`,background:`linear-gradient(90deg,${roadmap.color},${roadmap.color}aa)`}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:"#94A3B8"}}>
            <span>Beginner</span>
            {remaining>0&&<span>~{Math.round(estWeeks)} weeks remaining at 10h/week</span>}
            {remaining===0&&<span style={{color:"#10B981",fontWeight:700}}>Roadmap Complete!</span>}
            <span>Job Ready</span>
          </div>
        </div>
      </div>

      {/* Phase sections */}
      {roadmap.phases.map((ph,i)=>(
        <PhaseSection key={ph.id} phase={ph} progress={progress} onSkillSelect={setSelectedSkill} isLast={i===roadmap.phases.length-1}/>
      ))}

      {/* Roles & Companies */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:20}}>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,fontSize:14,color:"#0F172A",marginBottom:12}}>Job Roles You Can Target</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {roadmap.roles.map(r=>(
              <span key={r} style={{padding:"5px 12px",borderRadius:999,background:roadmap.bg,color:roadmap.color,fontSize:12,fontWeight:600}}>{r}</span>
            ))}

        </div>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,fontSize:14,color:"#0F172A",marginBottom:12}}>Top Hiring Companies</div>

      </div>
      {selectedSkill&&<div onClick={()=>setSelectedSkill(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.25)",zIndex:99}}/>}
    </div>
  );
}

  const totalSolved=Object.keys(solved).length;

    if(diffFilter!=="all"&&p.d!==diffFilter) return false;

  return(

      {company&&(
        <div className="card slide-in" style={{overflow:"hidden"}}>
          <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #F1F5F9",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,background:"#FAFAFA"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img style={{width:28,height:28,borderRadius:7,objectFit:"contain"}} src={`https://logo.clearbit.com/${company.domain}`} onError={e=>{e.target.style.display="none";}} alt={company.name}/>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#0F172A"}}>{company.name} — Interview Problems</div>
                <div style={{fontSize:11,color:"#64748B"}}>{solvedCount(company)}/{company.problems.length} solved · <span style={{color:"#16A34A"}}>{company.problems.filter(p=>p.d==="E").length} Easy</span> · <span style={{color:"#D97706"}}>{company.problems.filter(p=>p.d==="M").length} Medium</span> · <span style={{color:"#DC2626"}}>{company.problems.filter(p=>p.d==="H").length} Hard</span></div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <input className="inp" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:150,fontSize:12,padding:"6px 10px"}}/>
              {["all","E","M","H"].map(f=>(
                <button key={f} className={`ftab ${diffFilter===f?"active":""}`} onClick={()=>setDiffFilter(f)}>
                  {f==="all"?"All":f==="E"?"Easy":f==="M"?"Medium":"Hard"}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"22px 74px 1fr 56px",gap:10,padding:"7px 18px",background:"#F1F5F9",fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".05em"}}>
            <div/><div>Level</div><div>Problem</div><div style={{textAlign:"right"}}>Accept</div>
          </div>
          {filteredProblems.length===0?(
            <div style={{padding:"32px",textAlign:"center",color:"#94A3B8",fontSize:13}}>No problems match your filter.</div>
          ):filteredProblems.map(p=>{
            const key=`${company.id}_${p.n}`;
            const isSolved=!!solved[key];
            return(
              <div key={p.n} className="prob-row" style={{background:isSolved?"#F0FDF4":"#fff"}}>
                <input type="checkbox" className="prob-solved-cb" checked={isSolved} onChange={()=>onToggle(key)} title={isSolved?"Mark unsolved":"Mark solved"}/>
                <div className={`diff-${p.d}`}>{p.d==="E"?"Easy":p.d==="M"?"Medium":"Hard"}</div>
                <div>
                  <a href={`https://leetcode.com/problems/${p.slug}/`} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:12.5,fontWeight:600,color:isSolved?"#10B981":"#1E293B",textDecoration:"none",display:"block",marginBottom:3}}>
                    #{p.n} · {p.title}
                  </a>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{p.topics.map(t=><span key={t} className="topic-chip">{t}</span>)}</div>
                </div>
                <div style={{textAlign:"right",fontSize:11.5,color:"#64748B",fontWeight:500}}>{p.acc}</div>
              </div>
            );
          })}
          <div style={{padding:"10px 18px",borderTop:"1px solid #F1F5F9",display:"flex",gap:18,fontSize:11.5,color:"#64748B",background:"#FAFAFA",flexWrap:"wrap"}}>
            {[{l:"Total",v:company.problems.length,c:"#6366F1"},{l:"Easy",v:company.problems.filter(p=>p.d==="E").length,c:"#16A34A"},{l:"Medium",v:company.problems.filter(p=>p.d==="M").length,c:"#D97706"},{l:"Hard",v:company.problems.filter(p=>p.d==="H").length,c:"#DC2626"},{l:"Solved",v:solvedCount(company),c:"#10B981"}].map(s=>(
              <span key={s.l}><strong style={{color:s.c}}>{s.v}</strong> {s.l}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────── */
function Sidebar({activePath,onSelect,activeView,onViewChange,progress,solved}){
  const totalSolved=Object.keys(solved).length;
  return(
    <div className="sidebar">
      <div className="sb-logo">
        <div style={{fontSize:15,fontWeight:800,color:"#fff",letterSpacing:"-.02em",marginBottom:1}}>CareerOS AI</div>
        <div style={{fontSize:10.5,color:"rgba(255,255,255,.4)",fontWeight:500}}>Graduate Roadmap Hub</div>
      </div>
      <div className="sb-nav">
        <button className={`sb-path ${!activePath&&activeView!=="companies"?"active":""}`} style={{width:"100%",border:"none",textAlign:"left"}}
          onClick={()=>{onSelect(null);onViewChange(null);}}>
          <span className="sb-icon" style={{color:"rgba(255,255,255,.55)",width:17,height:17}}>{Ic.map}</span>
          <span style={{fontSize:13,fontWeight:600,color:(!activePath&&activeView!=="companies")?"#fff":"rgba(255,255,255,.55)"}}>All Paths</span>
        </button>
        <div className="sb-section">Career Paths</div>
        {ROADMAPS.map(r=>{
          const prog=calcPathProgress(r,progress);
          const active=activePath===r.id&&activeView!=="companies";
          return(
            <button key={r.id} className={`sb-path ${active?"active":""}`} style={{width:"100%",border:"none",textAlign:"left"}}
              onClick={()=>{onSelect(r.id);onViewChange(null);}}>
              <span style={{fontSize:15,color:active?r.color:r.color+"99",flexShrink:0}}>{r.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12.5,fontWeight:600,color:active?"#fff":"rgba(255,255,255,.55)",lineHeight:1.2}}>{r.title}</div>
                {prog.done>0&&<div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:1}}>{prog.pct}% complete</div>}
              </div>
              {prog.done>0&&(
                <div style={{width:24,height:24,borderRadius:"50%",background:`${r.color}33`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:9,fontWeight:800,color:r.color}}>{prog.pct}</span>
                </div>
              )}
            </button>
          );
        })}
        <div className="sb-section">Interview Prep</div>
        <button className={`sb-companies-btn ${activeView==="companies"?"active":""}`}
          onClick={()=>{onViewChange("companies");onSelect(null);}}>
          <span style={{fontSize:16,flexShrink:0}}>&#x1F3E2;</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12.5,fontWeight:600,color:activeView==="companies"?"#fff":"rgba(255,255,255,.55)",lineHeight:1.2}}>Companies</div>
            {totalSolved>0&&<div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:1}}>{totalSolved} problems solved</div>}
          </div>
          {totalSolved>0&&(
            <div style={{width:24,height:24,borderRadius:"50%",background:"rgba(16,185,129,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:9,fontWeight:800,color:"#10B981"}}>{totalSolved}</span>
            </div>
          )}
        </button>
      </div>
      <div style={{padding:"14px 12px",borderTop:"1px solid rgba(255,255,255,.07)"}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:2}}>Powered by</div>
        <a href="https://roadmap.sh/roadmaps" target="_blank" rel="noopener noreferrer" style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.6)",textDecoration:"none",display:"flex",alignItems:"center",gap:4}}>
          roadmap.sh <span style={{width:11,height:11}}>{Ic.ext}</span>
        </a>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   TOP NAV
───────────────────────────────────────────── */
function TopNav({activePath,onReset,activeView,progress}){
  const roadmap=ROADMAPS.find(r=>r.id===activePath);
  const allDone=Object.values(progress).filter(v=>v==="done").length;
  return(
    <div className="top-nav">
      <div>
        {activeView==="companies"?(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>onReset(null)} style={{fontSize:12,color:"#6366F1",fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>Home</button>
            <span style={{color:"#CBD5E1"}}>/</span>
            <span style={{fontSize:12,fontWeight:700,color:"#0F172A"}}>Interview Prep</span>
          </div>
        ):roadmap?(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>onReset(null)} style={{fontSize:12,color:"#6366F1",fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>All Paths</button>
            <span style={{color:"#CBD5E1"}}>/</span>
            <span style={{fontSize:12,fontWeight:700,color:"#0F172A"}}>{roadmap.title}</span>
          </div>
        ):<span style={{fontSize:13,fontWeight:700,color:"#0F172A"}}>Graduate Career Roadmap Hub</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:12,color:"#64748B"}}>
          <strong style={{color:"#6366F1"}}>{allDone}</strong> skills completed
        </div>
        <button onClick={()=>{if(window.confirm("Reset all progress?"))localStorage.removeItem(STORAGE_KEY);window.location.reload();}}
          style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#94A3B8",fontWeight:600,background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>
          <div style={{width:13,height:13}}>{Ic.reset}</div>
          Reset
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP
───────────────────────────────────────────── */
function App(){
  const [activePath,setActivePath]=useState(null);
  const [activeView,setActiveView]=useState(null);
  const [progress,setProgress]=useState(loadProgress);
  const [solved,setSolved]=useState(loadSolved);

  const handleProgressChange=useCallback((id,status)=>{
    setProgress(prev=>{
      const next={...prev,[id]:status};
      saveProgress(next);
      return next;
    });
  },[]);

  const handleToggleSolved=useCallback((key)=>{
    setSolved(prev=>{
      const next={...prev};
      if(next[key]) delete next[key]; else next[key]=true;
      saveSolved(next);
      return next;
    });
  },[]);

  const activeRoadmap=ROADMAPS.find(r=>r.id===activePath);

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar activePath={activePath} onSelect={setActivePath}
        activeView={activeView} onViewChange={setActiveView}
        progress={progress} solved={solved}/>
      <div className="main-content">
        <TopNav activePath={activePath} onReset={(p)=>{setActivePath(p);setActiveView(null);}}
          activeView={activeView} progress={progress}/>
        <div className="content-inner">
          {activeView==="companies"
            ?<CompaniesView solved={solved} onToggle={handleToggleSolved}/>
            :activeRoadmap
              ?<RoadmapView roadmap={activeRoadmap} progress={progress} onProgressChange={handleProgressChange}/>
              :<PathSelector onSelect={(id)=>{setActivePath(id);setActiveView(null);}} progress={progress}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
