<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerOS AI — After 12th</title>
<base href="/class-12/"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
(function installGsapFallback(){
const install=function(){
  if(window.gsap) return;
  const activeTriggers=[];
  const toArray=targets=>typeof targets==="string"?Array.from(document.querySelectorAll(targets)):targets instanceof Element?[targets]:Array.from(targets||[]);
  const transformFromVars=vars=>{
    const parts=[];
    if(vars.y!==undefined) parts.push(`translateY(${vars.y}px)`);
    if(vars.x!==undefined) parts.push(`translateX(${vars.x}px)`);
    if(vars.scale!==undefined) parts.push(`scale(${vars.scale})`);
    return parts.join(" ")||"none";
  };
  const play=(el,fromVars,toVars,index)=>{
    const delay=((toVars.delay||0)+(toVars.stagger||0)*index)*1000;
    const duration=(toVars.duration||.6)*1000;
    const start={opacity:fromVars.opacity,transform:transformFromVars(fromVars),clipPath:fromVars.clipPath};
    const end={opacity:toVars.opacity,transform:transformFromVars(toVars),clipPath:toVars.clipPath};
    Object.entries(start).forEach(([key,value])=>{ if(value!==undefined) el.style[key]=value; });
    setTimeout(()=>{
      const anim=el.animate([start,end],{duration,easing:"cubic-bezier(.22,1,.36,1)",fill:"forwards"});
      anim.onfinish=()=>Object.entries(end).forEach(([key,value])=>{ if(value!==undefined) el.style[key]=value; });
    },delay);
  };
  window.ScrollTrigger={getAll(){return activeTriggers;}};
  window.gsap={
    registerPlugin(){},
    killTweensOf(){},
    utils:{toArray},
    fromTo(targets,fromVars,toVars){
      const els=toArray(targets);
      els.forEach((el,index)=>{
        if(toVars.scrollTrigger&&"IntersectionObserver" in window){
          const observer=new IntersectionObserver(entries=>{
            entries.forEach(entry=>{ if(entry.isIntersecting) play(el,fromVars,toVars,index); });
          },{threshold:.12});
          observer.observe(toVars.scrollTrigger.trigger||el);
          activeTriggers.push({kill(){observer.disconnect();}});
        }else{
          play(el,fromVars,toVars,index);
        }
      });
    }
  };
};
if(document.readyState==="loading") window.addEventListener("DOMContentLoaded",install,{once:true});
else install();
})();
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#1b1b20;
  --muted:#71727a;
  --soft:#f6f8ff;
  --soft-blue:#edf3ff;
  --line:#e7eaf2;
  --panel:#ffffff;
  --black:#17171a;
  --blue:#2f67c8;
  --blue-soft:#dfe9ff;
  --shadow:0 18px 45px rgba(40,48,70,.06);
}
*{font-family:'Inter',sans-serif;box-sizing:border-box;margin:0;padding:0;}
h1,h2,h3,.display-font{font-family:'Hanken Grotesk','Inter',sans-serif;}
html,body{min-height:100%;background:var(--soft-blue);color:var(--ink);overflow-x:hidden;}
body{width:100%;}
button,input,select{font:inherit;}
button{border:none;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#f2f4f8;}
::-webkit-scrollbar-thumb{background:#a5a8af;border-radius:99px;}

.app-shell{display:flex;min-height:100vh;background:linear-gradient(132deg,#f8fbff 0%,#eef3ff 48%,#f9fbff 100%);}

/* Onboarding */
.ob-card{background:rgba(255,255,255,.92);border:1px solid rgba(223,228,239,.9);border-radius:24px;box-shadow:var(--shadow);max-width:560px;width:100%;padding:40px;backdrop-filter:blur(18px);}
.ob-opt{border:1px solid #E2E8F0;border-radius:16px;padding:18px 20px;cursor:pointer;transition:all .22s;background:#fff;}
.ob-opt:hover{border-color:#2f67c8;background:#f7faff;transform:translateY(-2px);}
.ob-opt.sel{border-color:#2f67c8;background:#eef4ff;box-shadow:0 0 0 4px rgba(47,103,200,.12);}
.ob-tile{border:1px solid #E2E8F0;border-radius:16px;padding:16px 12px;cursor:pointer;transition:all .22s;background:#fff;text-align:center;}
.ob-tile:hover{border-color:#2f67c8;background:#f7faff;transform:translateY(-2px);}
.ob-tile.sel{border-color:#2f67c8;background:#eef4ff;box-shadow:0 0 0 4px rgba(47,103,200,.1);}
.ob-tile.dim{opacity:.4;pointer-events:none;}

/* Steps progress */
.step-dot{width:10px;height:10px;border-radius:50%;transition:all .3s;}
.step-dot.done{background:#2f67c8;}
.step-dot.active{background:#2f67c8;box-shadow:0 0 0 5px rgba(47,103,200,.18);}
.step-dot.pending{background:#D8DDE7;}

/* Sidebar */
.sidebar{width:300px;min-width:300px;background:rgba(248,250,255,.9);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid rgba(222,226,236,.95);backdrop-filter:blur(18px);z-index:30;}
.sb-logo{padding:34px 30px 28px;border-bottom:1px solid rgba(226,230,239,.7);}
.brand-row{display:flex;align-items:center;gap:14px;}
.brand-mark{width:42px;height:42px;border-radius:16px;background:#17171a;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(23,23,26,.12);}
.brand-mark svg{width:22px;height:22px;}
.brand-title{font-size:15px;font-weight:800;color:#1e1f25;line-height:1.1;}
.brand-subtitle{font-size:12px;color:#737781;margin-top:4px;}
.sb-nav{padding:28px 20px;flex:1;}
.sb-item{width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:20px;cursor:pointer;color:#6e727d;font-size:15px;font-weight:700;transition:transform .22s ease,background .22s ease,color .22s ease,box-shadow .22s ease;margin-bottom:8px;background:transparent;text-align:left;}
.sb-item:hover{background:#fff;color:#1e1f25;transform:translateX(3px);box-shadow:0 10px 28px rgba(45,52,70,.06);}
.sb-item.active{background:#17171a;color:#fff;box-shadow:0 16px 32px rgba(23,23,26,.16);}
.sb-item.active .sb-icon{color:#fff;}
.sb-icon{width:20px;height:20px;flex-shrink:0;color:currentColor;display:flex;}
.sb-section{font-size:10px;font-weight:800;letter-spacing:.12em;color:#a1a5af;padding:0 14px 12px;text-transform:uppercase;}
.profile-chip{margin:0 20px 22px;padding:16px;border-radius:22px;background:#fff;border:1px solid rgba(226,230,239,.9);box-shadow:0 14px 34px rgba(40,48,70,.05);}
.sb-section,.sb-logo > div[style],.sidebar > div[style]{display:none!important;}

/* App chrome */
.main-content{margin-left:300px;min-height:100vh;flex:1;background:linear-gradient(132deg,#fafcff 0%,#eef4ff 58%,#f7f9ff 100%);}
.topbar{height:92px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid rgba(223,228,239,.85);background:rgba(248,250,255,.8);backdrop-filter:blur(20px);}
.search-pill{height:46px;min-width:320px;display:flex;align-items:center;gap:12px;padding:0 18px;border-radius:999px;background:#fff;border:1px solid rgba(228,232,241,.92);color:#7b7f89;box-shadow:0 10px 24px rgba(45,52,70,.04);}
.search-pill svg{width:18px;height:18px;}
.search-pill input{width:100%;border:0;outline:0;color:#1e1f25;background:transparent;font-size:14px;}
.top-actions{display:flex;align-items:center;gap:14px;}
.verified-pill{height:42px;display:flex;align-items:center;gap:10px;padding:0 18px;border-radius:999px;background:#dfe8ff;color:#3461b6;font-size:14px;font-weight:800;}
.verified-pill svg{width:17px;height:17px;}
.avatar-pill{width:48px;height:48px;border-radius:50%;background:#17171a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;}
.content-inner{padding:38px 44px 86px;max-width:1320px;margin:0 auto;}

/* Dashboard */
.dashboard-page{display:flex;flex-direction:column;gap:34px;}
.dashboard-hero{max-width:760px;}
.eyebrow{font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;}
.hero-title{font-size:64px;line-height:1.02;font-weight:400;color:#17171a;margin-bottom:22px;letter-spacing:0;}
.hero-copy{font-size:18px;line-height:1.7;color:#70737d;max-width:760px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px;}
.feature-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px;}
.feature-card{min-height:224px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.feature-icon{width:52px;height:52px;border-radius:18px;background:#f2f3f5;display:flex;align-items:center;justify-content:center;color:#1e1f25;margin-bottom:38px;}
.feature-icon svg{width:27px;height:27px;}
.feature-arrow{position:absolute;right:24px;top:24px;width:18px;height:18px;color:#8a8d95;}
.signal-card{grid-column:span 1;min-height:224px;}
.quick-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.quick-row{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border-radius:16px;background:#f7f8fb;border:1px solid #edf0f6;text-align:left;cursor:pointer;transition:all .2s ease;}
.quick-row:hover{background:#fff;border-color:#ccd8f6;transform:translateY(-2px);}

/* Cards */
.card{background:rgba(255,255,255,.92);border-radius:22px;box-shadow:var(--shadow);border:1px solid rgba(229,232,240,.95);backdrop-filter:blur(18px);}
.stat-card{background:rgba(255,255,255,.92);border-radius:22px;padding:28px 26px;border:1px solid rgba(229,232,240,.95);box-shadow:var(--shadow);min-height:172px;display:flex;flex-direction:column;justify-content:center;transition:transform .22s ease,box-shadow .22s ease;}
.stat-card:hover,.card:hover,.exam-card:hover{transform:translateY(-3px);box-shadow:0 24px 55px rgba(35,42,62,.09);}
.stat-label{font-size:12px;font-weight:900;letter-spacing:.18em;color:#747782;text-transform:uppercase;margin-bottom:20px;}
.stat-value{font-size:52px;line-height:1;font-weight:900;color:#17171a;margin-bottom:12px;}
.stat-value small{font-size:16px;font-weight:800;color:#555963;}
.stat-sub{font-size:14px;color:#70737d;line-height:1.5;}

/* Pill badge */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;}

/* Slider */
.sld{-webkit-appearance:none;width:100%;height:7px;border-radius:99px;outline:none;cursor:pointer;background:#E2E8F0;}
.sld::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#2f67c8;cursor:pointer;box-shadow:0 2px 8px rgba(47,103,200,.35);transition:transform .15s;}
.sld::-webkit-slider-thumb:hover{transform:scale(1.16);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.fade-up{animation:fadeUp .35s ease both;}
.spin{animation:spin 1s linear infinite;}
.pulse{animation:pulse 2s ease infinite;}
.reveal-text{will-change:transform,opacity,clip-path;}
.motion-card{will-change:transform,opacity;}

/* AI Processing */
.ai-ring{width:86px;height:86px;border-radius:50%;border:3px solid #E2E8F0;border-top-color:#2f67c8;animation:spin 1s linear infinite;}

/* Exam card */
.exam-card{background:rgba(255,255,255,.92);border:1px solid rgba(226,230,239,.95);border-radius:22px;padding:22px;cursor:pointer;transition:all .22s ease;box-shadow:0 12px 30px rgba(40,48,70,.04);}
.exam-card.expanded{border-color:#a9bdf0;box-shadow:0 18px 45px rgba(47,103,200,.1);}

/* Test */
.opt-btn{width:100%;text-align:left;padding:14px 18px;border-radius:16px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;transition:all .18s;font-size:14px;}
.opt-btn:hover{border-color:#2f67c8;background:#f5f8ff;}
.opt-btn.selected{border-color:#2f67c8;background:#eef4ff;}
.opt-btn.correct{border-color:#10B981;background:#ECFDF5;color:#065F46;}
.opt-btn.wrong{border-color:#EF4444;background:#FEF2F2;color:#991B1B;}

/* Progress bar */
.prog-bar{height:9px;border-radius:99px;background:#E2E8F0;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 1s ease;}

/* Roadmap timeline */
.timeline-line{position:absolute;left:19px;top:42px;width:2px;height:calc(100% - 20px);background:linear-gradient(to bottom,#2f67c8,#E2E8F0);}

/* Tab underline */
.tab-btn{padding:11px 16px;font-size:13.5px;font-weight:700;color:#64748B;border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;background:transparent;}
.tab-btn.active{color:#2f67c8;border-bottom-color:#2f67c8;}
.tab-btn:hover{color:#2f67c8;}

/* Input */
.inp{width:100%;border:1.5px solid #E2E8F0;border-radius:14px;padding:11px 14px;font-size:14px;outline:none;transition:border .18s,box-shadow .18s;background:#fff;}
.inp:focus{border-color:#2f67c8;box-shadow:0 0 0 4px rgba(47,103,200,.1);}

select.inp{background:#fff;}
.btn-primary{background:#17171a;color:#fff;border-radius:999px;padding:12px 24px;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:all .22s ease;}
.btn-primary:hover{background:#2b2c32;box-shadow:0 12px 26px rgba(23,23,26,.18);transform:translateY(-2px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-outline{background:#fff;color:#17171a;border:1.5px solid #d9dee9;border-radius:999px;padding:11px 23px;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s;}
.btn-outline:hover{background:#f5f8ff;border-color:#b8c6ea;}

@media (max-width:1180px){
  .stat-grid,.feature-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .hero-title{font-size:52px;}
}
@media (max-width:820px){
  .app-shell{display:block;}
  .sidebar{position:relative;width:100%;min-width:0;height:auto;border-right:0;border-bottom:1px solid var(--line);}
  .sb-nav{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;}
  .sb-section,.profile-chip{display:none;}
  .sb-item{white-space:nowrap;margin:0;border-radius:999px;}
  .main-content{margin-left:0;}
  .topbar{height:auto;gap:14px;align-items:stretch;flex-direction:column;padding:18px;}
  .search-pill{min-width:0;width:100%;}
  .content-inner{padding:28px 18px 60px;}
  .hero-title{font-size:42px;}
  .stat-grid,.feature-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="/class-12/app.compiled.js"></script>
</body>
</html>
